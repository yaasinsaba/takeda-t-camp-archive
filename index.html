        .container { max-width: 850px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

        /* リストのレイアウト */
        .book-row { display: flex; justify-content: space-between; align-items: center; padding: 30px 0; border-bottom: 1px solid #eee; }
        .book-row:last-child { border-bottom: none; }
        
        .book-info { flex: 1; padding-right: 30px; }
        .book-title { font-size: 22px; font-weight: bold; display: block; margin-bottom: 15px; color: #1a1a1a; }
        
        /* 表紙画像のスタイル */
        .book-cover-container { text-align: center; width: 150px; flex-shrink: 0; }
        .book-cover { width: 100%; height: auto; border: 1px solid #ddd; border-radius: 4px; box-shadow: 4px 4px 10px rgba(0,0,0,0.1); }
        
        /* ボタンのスタイル */
        .btn-group { margin-top: 20px; }
        .btn { display: inline-block; background: #333; color: white; padding: 8px 24px; text-decoration: none; font-size: 15px; font-weight: bold; border-radius: 5px; margin-right: 12px; transition: all 0.3s ease; }
        .btn-save { background: white; color: #333; border: 2px solid #333; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }
        .pdf-badge { background: #d93025; color: white; padding: 2px 8px; font-size: 11px; font-weight: bold; border-radius: 4px; margin-left: 10px; vertical-align: middle; }
    </style>
