<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竹田Tキャンプ 10周年アーカイブ</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .book { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        img { width: 100%; height: auto; border-bottom: 1px solid #eee; margin-bottom: 10px; }
        .btn { display: inline-block; background: #2ecc71; color: white; padding: 8px 12px; text-decoration: none; border-radius: 4px; margin: 5px; font-size: 14px; }
        .btn-dl { background: #3498db; }
    </style>
</head>
<body>
    <h1>竹田Tキャンプ 10周年記念冊子アーカイブ</h1>
    <p>10年間の活動の軌跡をオンラインでご覧いただけます。</p>
    
    <div class="grid">
        <div class="book">
            <img src="2016.jpg" alt="2016表紙">
            <p>2016年度号</p>
            <a href="2016.pdf" target="_blank" class="btn">読む (PDF)</a>
            <a href="2016.pdf" download class="btn btn-dl">保存</a>
        </div>

        </div>
</body>
</html>
